name: Etica Daily Intelligence Brief

on:
  schedule:
    - cron: "30 2 * * 1-6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-daily-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Keep workflow alive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keep workflow alive [skip ci]"
          git push

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run intelligence pipeline
        env:
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          EMAIL_USER:      ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_1:     ${{ secrets.RECIPIENT_1 }}
          RECIPIENT_2:     ${{ secrets.RECIPIENT_2 }}
          RECIPIENT_3:     ${{ secrets.RECIPIENT_3 }}
          RECIPIENT_4:     ${{ secrets.RECIPIENT_4 }}
          RECIPIENT_5:     ${{ secrets.RECIPIENT_5 }}
          RECIPIENT_6:     ${{ secrets.RECIPIENT_6 }}
        run: python main.py